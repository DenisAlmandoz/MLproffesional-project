name: CD - Deploy Databricks Bundle

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Databricks bundle target to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main

jobs:
  deploy-bundle:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target ${{ github.event.inputs.target || 'dev' }}

      - name: Deploy bundle
        run: databricks bundle deploy --target ${{ github.event.inputs.target || 'dev' }}
