name: CD - Deploy Databricks Bundle

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Databricks bundle target to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

  push:
    branches:
      - main

jobs:
  deploy-bundle:
    runs-on: ubuntu-latest

    env:
      BUNDLE_TARGET: ${{ github.event.inputs.target || 'dev' }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        working-directory: ./dab
        run: databricks bundle validate --target $BUNDLE_TARGET

      - name: Deploy bundle
        working-directory: ./dab
        run: |
          databricks bundle deploy \
            --target $BUNDLE_TARGET \
            --var="existing_cluster_id=${DATABRICKS_CLUSTER_ID}"