bundle:
  name: ml_exam_lifecycle_project

variables:
  catalog:
    default: main
  schema:
    default: ml_exam
  existing_cluster_id:
    description: Existing cluster used by job tasks
    default: 42be771719f14826

sync:
  paths:
    - .
    - ../scripts
    - ../src
    - ../pyproject.toml

resources:
  experiments:
    ml_exam_experiment:
      name: /Shared/ml_exam_project

  registered_models:
    exam_candidate_model:
      name: ${var.catalog}.${var.schema}.exam_candidate_model

  jobs:
    ml_lifecycle_job:
      name: ml-lifecycle-end-to-end

      tasks:
        - task_key: ingest_seed_data
          existing_cluster_id: ${var.existing_cluster_id}
          spark_python_task:
            python_file: ../scripts/run_data_ingestion.py

        - task_key: build_features
          depends_on:
            - task_key: ingest_seed_data
          existing_cluster_id: ${var.existing_cluster_id}
          spark_python_task:
            python_file: ../scripts/run_feature_pipeline.py

        - task_key: train_model
          depends_on:
            - task_key: build_features
          existing_cluster_id: ${var.existing_cluster_id}
          spark_python_task:
            python_file: ../scripts/run_training.py

        - task_key: monitor
          depends_on:
            - task_key: train_model
          existing_cluster_id: ${var.existing_cluster_id}
          spark_python_task:
            python_file: ../scripts/run_monitoring.py

        - task_key: retrain
          depends_on:
            - task_key: monitor
          existing_cluster_id: ${var.existing_cluster_id}
          spark_python_task:
            python_file: ../scripts/run_retraining.py

targets:
  dev:
    mode: development
    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com